
{% extends "base.html" %}

{% block content %}

<div class="container-fluid px-4 mt-4">

    <h2 class="mb-4">

        Enterprise AI Operations Center

    </h2>


    <!-- PRIMARY METRICS -->
    <div class="row mb-4">

        <div class="col-md-3">

            <div class="card shadow border-0">

                <div class="card-body">

                    <h6>Total Jobs</h6>

                    <h2 id="totalJobs">0</h2>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card shadow border-0">

                <div class="card-body">

                    <h6>Processing</h6>

                    <h2 id="processingJobs">0</h2>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card shadow border-0">

                <div class="card-body">

                    <h6>Completed</h6>

                    <h2 id="completedJobs">0</h2>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card shadow border-0">

                <div class="card-body">

                    <h6>Failed</h6>

                    <h2 id="failedJobs">0</h2>

                </div>

            </div>

        </div>

    </div>


    <!-- ADVANCED METRICS -->
    <div class="row mb-4">

        <div class="col-md-3">

            <div class="card shadow border-0 bg-dark text-white">

                <div class="card-body">

                    <h6>Queue Depth</h6>

                    <h2 id="queueDepth">0</h2>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card shadow border-0 bg-dark text-white">

                <div class="card-body">

                    <h6>Avg Processing</h6>

                    <h2 id="avgProcessing">0s</h2>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card shadow border-0 bg-dark text-white">

                <div class="card-body">

                    <h6>Total Retries</h6>

                    <h2 id="totalRetries">0</h2>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card shadow border-0 bg-dark text-white">

                <div class="card-body">

                    <h6>Failures Today</h6>

                    <h2 id="failuresToday">0</h2>

                </div>

            </div>

        </div>

    </div>


    <!-- LIVE JOBS + AUDIT LOGS -->
    <div class="row">

        <!-- LIVE JOBS -->
        <div class="col-md-7 mb-4">

            <div class="card shadow border-0 h-100">

                <div class="card-body">

                    <h5 class="mb-3">

                        Live Processing Jobs

                    </h5>

                    <div class="table-responsive">

                        <table class="table table-hover table-striped align-middle">

                            <thead>

                                <tr>

                                    <th>File</th>
                                    <th>Status</th>
                                    <th>Retries</th>
                                    <th>Created</th>

                                </tr>

                            </thead>

                            <tbody id="recentJobsTable">

                            </tbody>

                        </table>

                    </div>

                </div>

            </div>

        </div>


        <!-- AUDIT LOGS -->
        <div class="col-md-5 mb-4">

            <div
                class="card shadow border-0 h-100"
                style="min-height: 500px;"
            >

                <div class="card-body">

                    <h5 class="mb-3">

                        Recent Audit Events

                    </h5>

                    <ul
                        class="list-group overflow-auto"
                        id="auditLogsList"
                        style="max-height: 420px;"
                    >

                    </ul>

                </div>

            </div>

        </div>

    </div>

</div>


<script src="{{ url_for(
    'static',
    filename='js/dashboard.js'
) }}"></script>

{% endblock %}
