{% extends "base.html" %}
{% block content %}



<h2 class="mb-4">

    AI Workflow Dashboard

</h2>

<div class="row">

    <div class="col-md-3">

        <div class="card text-bg-primary">

            <div class="card-body">

                <h5>Total Jobs</h5>

                <h2 id="totalJobs">0</h2>

            </div>

        </div>

    </div>

    <div class="col-md-3">

        <div class="card text-bg-warning">

            <div class="card-body">

                <h5>Processing</h5>

                <h2 id="Processing_Jobs">0</h2>

            </div>

        </div>

    </div>

    <div class="col-md-3">

        <div class="card text-bg-success">

            <div class="card-body">

                <h5>Completed</h5>

                <h2 id="Completed_Jobs">0</h2>

            </div>

        </div>

    </div>

    <div class="col-md-3">

        <div class="card text-bg-danger">

            <div class="card-body">

                <h5>Failed</h5>

                <h2 id="Failed_Jobs">0</h2>

            </div>

        </div>

    </div>

</div>

{% endblock %}

<script src="{{ url_for(
    'static',
    filename='js/dashboard.js'
) }}"></script>
