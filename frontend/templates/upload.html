{% extends "base.html" %}

{% block content %}

<h2>Upload File</h2>

<div class="card shadow">

    <div class="card-body">

        <form id="uploadForm">

            <input
                type="file"
                class="form-control mb-3"
                id="fileInput"
            >

            <button
                type="submit"
                class="btn btn-primary"
            >

                Upload

            </button>

        </form>

        <div id="uploadStatus" class="mt-3"></div>

    </div>

</div>

<script src="{{ url_for('static', filename='js/upload.js') }}"></script>

{% endblock %}
