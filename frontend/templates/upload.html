{% extends "base.html" %}

{% block content %}

<h2 class="mb-4">

    Upload File

</h2>

<div class="card shadow border-0">

    <div class="card-body">

        <form id="uploadForm">

            <!-- FILE INPUT -->
            <input
                type="file"
                class="form-control mb-3"
                id="fileInput"
                name="file"
                accept=".pdf,.png,.jpg,.jpeg,.mp3,.wav,.ogg,.mp4,.txt"
            >

            <!-- SUBMIT BUTTON -->
            <button
                type="submit"
                class="btn btn-primary"
            >

                Upload

            </button>

        </form>

        <!-- LOADING SPINNER -->
        <div
            id="uploadLoader"
            class="spinner-border text-primary d-none mt-3"
            role="status"
        >

            <span class="visually-hidden">

                Loading...

            </span>

        </div>

        <!-- STATUS AREA -->
        <div
            id="uploadStatus"
            class="mt-3"
        >

        </div>

    </div>

</div>

<script src="{{ url_for(
    'static',
    filename='js/upload.js'
) }}"></script>

{% endblock %}
