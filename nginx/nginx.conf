

events {}

http {

    server {
        
        add_header X-Frame-Options DENY;

        add_header X-Content-Type-Options nosniff;

        add_header Referrer-Policy no-referrer;

        listen 80;

        location / {

            proxy_pass http://enterprise_frontend:3000;
        }

        location /api/ {

            proxy_pass http://enterprise_api:5000;
        }
    }
}

