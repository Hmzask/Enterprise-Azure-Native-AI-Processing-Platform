
name: Deploy Enterprise Platform

on:
  push:
    branches:
      - main

jobs:

  deploy:
    runs-on: ubuntu-latest

    env:
      ACR_LOGIN_SERVER: enterpriseaicr-hrgqete4cpgwhacp.azurecr.io
      IMAGE_NAME: enterprise-api

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Docker Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: enterpriseaicr-hrgqete4cpgwhacp.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build \
            -t $ACR_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }} \
            -t $ACR_LOGIN_SERVER/$IMAGE_NAME:latest \
            ./api_service

      - name: Push Docker Image
        run: |
          docker push $ACR_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }}
          docker push $ACR_LOGIN_SERVER/$IMAGE_NAME:latest

      - name: Deploy to Azure Container App
        run: |
          az containerapp update \
            --name enterprise-api \
            --resource-group enterprise-ai-rg \
            --image $ACR_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }}

